<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Log.css">
    <title>Log in</title>
</head>

<style>
    .spinner {
        position: fixed;
        border: 3px solid rgba(0, 0, 0, 0.1);
        border-left-color: #fff;
        border-radius: 50%;
        margin-bottom: 60px;
        width: 17px;
        height: 17px;
        animation: spin 1s linear infinite;
        display: none;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }
</style>

<body>
    <div id="type">
        <h1>Chat from <span id="element">anywhere</span></h1>
    </div>
    <div class="image-container">
        <div id="side-image1">
            <img src="https://ouch-cdn2.icons8.com/nsyCk7AlFBFcZoZDdK2GMu9yfylnx_ZjsxvK9apyarg/rs:fit:368:923/czM6Ly9pY29uczgu/b3VjaC1wcm9kLmFz/c2V0cy9wbmcvNTkx/LzFhNmMyYjVkLTlh/NjQtNDI3Ny04OTk5/LTVjMjY2MjQ4ODE0/MS5wbmc.png"
                alt="">
        </div>
        <form id="log1" class="flex">
            <h1>Login</h1>
            <span><input type="email" name="email" id="email1" placeholder="Enter your email ad " class="i1">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                        d="M3 3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3ZM12.0606 11.6829L5.64722 6.2377L4.35278 7.7623L12.0731 14.3171L19.6544 7.75616L18.3456 6.24384L12.0606 11.6829Z">
                    </path>
                </svg>
            </span>
            <span id="second"><input type="password" id="password1" name="password" required
                    placeholder="Enter your password" class="i1"><svg xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                        d="M18 8H20C20.5523 8 21 8.44772 21 9V21C21 21.5523 20.5523 22 20 22H4C3.44772 22 3 21.5523 3 21V9C3 8.44772 3.44772 8 4 8H6V7C6 3.68629 8.68629 1 12 1C15.3137 1 18 3.68629 18 7V8ZM11 15.7324V18H13V15.7324C13.5978 15.3866 14 14.7403 14 14C14 12.8954 13.1046 12 12 12C10.8954 12 10 12.8954 10 14C10 14.7403 10.4022 15.3866 11 15.7324ZM16 8V7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7V8H16Z">
                    </path>
                </svg></span>
            <div id="remember-the-name">
                <span id="checkbox-d"><input type="checkbox" name="checkbox">
                    <p>Remember me</p>
                </span>
                <a href="#">Forgot password?</a>
            </div>
            <div class="end">
                <button class="btn" type="button" id="loadBtn1" onclick="login()"><span
                        id="load_dis1">Login</span></button>
                <div id="spinner1" class="spinner"></div>
                <div class="no-account">
                    <p>Don't have an account?</p>
                    <a href="#" id="cl">Register</a>
                </div>
            </div>
        </form>
        <form id="Res" class="flex isactive">
            <h1>Registration</h1>
            <span><input type="name" name="name" id="nm" placeholder="Enter the username" class="i1" required>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                        d="M2 22C2 17.5817 5.58172 14 10 14C14.4183 14 18 17.5817 18 22H2ZM10 13C6.685 13 4 10.315 4 7C4 3.685 6.685 1 10 1C13.315 1 16 3.685 16 7C16 10.315 13.315 13 10 13ZM20 17H24V19H20V17ZM17 12H24V14H17V12ZM19 7H24V9H19V7Z">
                    </path>
                </svg>

            </span>
            <span><input type="email" name="email" id="emailID" placeholder="Enter your email ad " class="i1" required>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                        d="M3 3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3ZM12.0606 11.6829L5.64722 6.2377L4.35278 7.7623L12.0731 14.3171L19.6544 7.75616L18.3456 6.24384L12.0606 11.6829Z">
                    </path>
                </svg>
            </span>
            <span id="second"><input type="password" id="password" name="password" required
                    placeholder="Enter your password" class="i1"><svg xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                        d="M18 8H20C20.5523 8 21 8.44772 21 9V21C21 21.5523 20.5523 22 20 22H4C3.44772 22 3 21.5523 3 21V9C3 8.44772 3.44772 8 4 8H6V7C6 3.68629 8.68629 1 12 1C15.3137 1 18 3.68629 18 7V8ZM11 15.7324V18H13V15.7324C13.5978 15.3866 14 14.7403 14 14C14 12.8954 13.1046 12 12 12C10.8954 12 10 12.8954 10 14C10 14.7403 10.4022 15.3866 11 15.7324ZM16 8V7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7V8H16Z">
                    </path>
                </svg></span>

            <!-- New to added -->
            <div class="otpVerification">
                <span id="second"><input type="number" id="getOTP" name="otp" required placeholder="OTP"
                        class="i1"></span> <button class="GetVerified" id="id-otp">Get OTP</button>
            </div>
            <div class="end">
                <button class="btn" id="loadBtn" onclick="Resister()" id="Register-btn" type="submit"
                    value="submit"><span id="load_dis">
                        Register</button></span>
                <div id="spinner" class="spinner"></div>
                <div class="no-account">
                    <p>Already have an account?</p>
                    <a href="#" id="rl">Login</a>
                </div>
            </div>
        </form>
        <div id="side-image2">
            <img src="https://ouch-cdn2.icons8.com/Ibv3JdoZyRxhYeSv1cnkys7hnb1T9gW7jW7BtXV8SLY/rs:fit:368:832/czM6Ly9pY29uczgu/b3VjaC1wcm9kLmFz/c2V0cy9wbmcvNDQy/L2M5Mjk5N2E3LWI0/NjQtNGNkMC05MDBh/LTU0Yjg1MjIwMTA3/YS5wbmc.png"
                alt="">
        </div>
        <div class="pop-up ispop" style="display: flex; align-items: center; justify-content: center; column-gap: 8px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path
                    d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4C7.58172 4 4 7.58172 4 12C4 16.4183 7.58172 20 12 20ZM11 15H13V17H11V15ZM11 7H13V13H11V7Z">
                </path>
            </svg>
            <p>Email address is required</p>
        </div>
    </div>

    <script>
        async function Resister() {
            const name = document.getElementById('nm').value;
            const email = document.getElementById('emailID').value;
            const password = document.getElementById('password').value;
            const otp = document.getElementById('getOTP').value;

            try {
                const response = await fetch('http://localhost:5500/api/user/resister', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password, otp }),
                });

                if (!response.ok) {
                    throw new Error('Resistration failed');
                }
            } catch (error) {
                throw new Error("Something went wrong! please try letter");
                return;
            }
        }
        async function login() {
            startLoading1();
            const email = document.getElementById('email1').value;
            const password = document.getElementById('password1').value;
            try {
                const response = await fetch('http://localhost:5500/api/user/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

console.log(response);
                if (!response.ok) {
                    throw new Error('Login failed');
                }
                const data = await response.json();
                localStorage.setItem('name', data.user.name);
                localStorage.setItem('email', data.user.email);
                localStorage.setItem('UserId', data.user._id);
                localStorage.setItem('UserToken', data.user.token);
                const token = localStorage.getItem('UserToken');

                window.location.href = `/api/user/Dashboard?token=${localStorage.getItem('UserToken')}`;

                // const newTab = window.open();    
                // newTab.document.write(data.fileContent);
            } catch (error) {
                console.error('Error during login:', error);
            }
        }
        function startLoading() {

            let spinner = document.getElementById("spinner");
            let loadBtn = document.getElementById("loadBtn");
            let load_dis = document.getElementById('load_dis');
            load_dis.style.color = '#6674cc'
            // Show spinner
            spinner.style.display = "inline-block";
            // Disable button to prevent multiple clicks
            loadBtn.disabled = true;

            setTimeout(function () {
                spinner.style.display = "none";
                load_dis.style.color = '#fff'
                // Enable button after loading is complete
                loadBtn.disabled = false;
            }, 2000);
        }

        function startLoading1() {

            let spinner1 = document.getElementById("spinner1");
            let loadBtn1 = document.getElementById("loadBtn1");
            let load_dis1 = document.getElementById('load_dis1');
            load_dis1.style.color = '#6674cc'
            // Show spinner
            spinner1.style.display = "inline-block";
            // Disable button to prevent multiple clicks
            loadBtn1.disabled = true;

            setTimeout(function () {
                spinner1.style.display = "none";
                load_dis1.style.color = '#fff'
                // Enable button after loading is complete
                loadBtn1.disabled = false;
            }, 1000);
        }
    </script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed('#element', {
            strings: ['', 'anywhere', 'anytime'],
            typeSpeed: 100,
            loop: true
        });
    </script>

    <script src="LogScript.js"></script>
</body>

</html>
